"""
Define parent-child relations between types. This is used to add `child*` and `children*` convenience fields like `childImageSharp`.
"""
directive @childOf(
  """
  A list of mime-types this type is a child of. Usually these are the mime-types handled by a transformer plugin.
  """
  mimeTypes: [String!]! = []

  """
  A list of types this type is a child of. Usually these are the types handled by a transformer plugin.
  """
  types: [String!]! = ["File"]
) on OBJECT

"""
Add date formatting options.
"""
directive @dateformat(
  difference: String
  formatString: String
  fromNow: Boolean
  locale: String
) on FIELD_DEFINITION

"""
Do not infer field types from field values.
"""
directive @dontInfer on OBJECT

"""
Link to File node by relative path.
"""
directive @fileByRelativePath(from: String) on FIELD_DEFINITION

"""
Infer field types from field values.
"""
directive @infer on OBJECT

"""
Link to node by foreign-key relation.
"""
directive @link(
  by: String! = "id"
  from: String
  on: String
) on FIELD_DEFINITION

"""
Define the mime-types handled by this type.
"""
directive @mimeTypes(
  """
  The mime-types handled by this type.
  """
  types: [String!]! = []
) on OBJECT

"""
DEPRECATED: Use interface inheritance instead, i.e. "interface Foo implements Node".

Adds root query fields for an interface. All implementing types must also implement the Node interface.
"""
directive @nodeInterface on INTERFACE

"""
Proxy resolver from another field.
"""
directive @proxy(from: String!, fromNode: Boolean! = false) on FIELD_DEFINITION

input AVIFOptions {
  lossless: Boolean
  quality: Int
  speed: Int
}

input BlurredOptions {
  """
  Force the output format for the low-res preview. Default is to use the same format as the input. You should rarely need to change this
  """
  toFormat: ImageFormat

  """
  Width of the generated low-res preview. Default is 20px
  """
  width: Int
}

input BooleanQueryOperatorInput {
  eq: Boolean
  in: [Boolean]
  ne: Boolean
  nin: [Boolean]
}

"""
A date string, such as 2007-12-03, compliant with the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar Date

input DateQueryOperatorInput {
  eq: Date
  gt: Date
  gte: Date
  in: [Date]
  lt: Date
  lte: Date
  ne: Date
  nin: [Date]
}

